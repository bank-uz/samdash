<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bank Risk Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; background:#0f172a; color:white; }
.container { width:90%; margin:auto; }
.card { background:#1e293b; padding:20px; margin:10px; border-radius:10px; display:inline-block; }
.hidden { display:none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input type="text" id="user" placeholder="Login"><br><br>
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Kirish</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden container">
  <h1>📊 Bank Risk Dashboard</h1>

  <div id="kpi"></div>

  <canvas id="chart1"></canvas>
  <canvas id="chart2"></canvas>
</div>

<script>

// 🔐 LOGIN
function login(){
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if(u==="admin" && p==="12345"){
    document.getElementById("login").style.display="none";
    document.getElementById("dashboard").classList.remove("hidden");
    loadData();
  } else {
    alert("Noto'g'ri login/parol");
  }
}

// 📡 GOOGLE SHEETS ID
const SHEET_ID = "1l3vEaGx-Ij0iqvHHW8mFE9-tLSOPIQcs8x1DITJECxM";
const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

// 📊 DATA LOAD
function loadData(){
fetch(URL)
.then(res => res.text())
.then(rep => {
  const json = JSON.parse(rep.substr(47).slice(0,-2));
  const rows = json.table.rows;

  let total = rows.length;
  let problem = 0;

  rows.forEach(r=>{
    let status = r.c[5]?.v; // status column
    if(status && status.includes("ишга тушмаган")) problem++;
  });

  // KPI
  document.getElementById("kpi").innerHTML = `
    <div class="card">Total: ${total}</div>
    <div class="card">Muammoli: ${problem}</div>
    <div class="card">Risk %: ${(problem/total*100).toFixed(1)}%</div>
  `;

  drawCharts(total, problem);
});
}

// 📈 CHART
function drawCharts(total, problem){

new Chart(document.getElementById("chart1"), {
  type: 'pie',
  data: {
    labels: ['Normal', 'Risk'],
    datasets: [{
      data: [total-problem, problem]
    }]
  }
});

new Chart(document.getElementById("chart2"), {
  type: 'bar',
  data: {
    labels: ['Projects'],
    datasets: [{
      label: 'Total',
      data: [total]
    },{
      label: 'Risk',
      data: [problem]
    }]
  }
});

}

</script>

</body>
</html>
